<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>404 — Gabriel Castro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- SPA fallback for GitHub Pages — rafgraph/spa-github-pages (MIT) -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>JavaScript required. <a href="/portfolio/">Return home</a>.</p>
    </noscript>
  </body>
</html>
