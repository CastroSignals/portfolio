<main class="not-found">
  <div class="container">
    <span class="not-found__label">{{ t('notFound.label') }}</span>
    <h1 class="not-found__title">
      {{ t('notFound.titleLine1') }}<br />
      {{ t('notFound.titleLine2') }}<br />
      {{ t('notFound.titleLine3') }}
    </h1>
    <p class="not-found__description">{{ t('notFound.description') }}</p>
    <nav class="not-found__actions" [attr.aria-label]="t('notFound.actions.ariaLabel')">
      <a routerLink="/" class="not-found__btn not-found__btn--primary">{{
        t('notFound.actions.home')
      }}</a>
      <a routerLink="/projects" class="not-found__btn not-found__btn--secondary">{{
        t('notFound.actions.projects')
      }}</a>
    </nav>
  </div>
</main>
