<section class="hero">
  <div class="hero__content">
    <span class="hero__label">{{ t('hero.label') }}</span>

    <h1 class="hero__name">{{ t('hero.nameFirst') }}<br />{{ t('hero.nameLast') }}</h1>

    <p class="hero__tagline">{{ t('hero.tagline') }}</p>

    <p class="hero__description">{{ t('hero.description') }}</p>

    <div class="hero__actions" role="group" [attr.aria-label]="t('hero.cta.groupAriaLabel')">
      <a href="#projects" class="hero__btn hero__btn--primary">{{ t('hero.cta.primary') }}</a>
      <a href="mailto:castrosignals@gmail.com" class="hero__btn hero__btn--secondary">{{
        t('hero.cta.secondary')
      }}</a>
    </div>

    <div class="hero__tech" role="list" [attr.aria-label]="t('hero.techStackAriaLabel')">
      @for (tech of techStack; track tech) {
        <span class="hero__tech-badge" role="listitem">{{ tech }}</span>
      }
    </div>
  </div>

  <div class="hero__grid" aria-hidden="true"></div>
</section>
