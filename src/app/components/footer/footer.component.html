<footer class="footer" role="contentinfo">
  <div class="footer__container">
    <div class="footer__top">
      <div class="footer__brand">
        <span class="footer__logo" aria-hidden="true">GC</span>
        <p class="footer__tagline">{{ t('footer.tagline') }}</p>
      </div>

      <nav class="footer__links" [attr.aria-label]="t('footer.linksAriaLabel')">
        <a
          href="https://linkedin.com/in/castrosignals"
          target="_blank"
          rel="noopener noreferrer"
          class="footer__link"
          [attr.aria-label]="t('footer.linkedinAriaLabel')"
          >{{ t('footer.linkedin') }}</a
        >
        <a
          href="https://github.com/castrosignals"
          target="_blank"
          rel="noopener noreferrer"
          class="footer__link"
          [attr.aria-label]="t('footer.githubAriaLabel')"
          >{{ t('footer.github') }}</a
        >
        <a
          href="mailto:castrosignals@gmail.com"
          class="footer__link"
          [attr.aria-label]="t('footer.emailAriaLabel')"
          >{{ t('footer.email') }}</a
        >
      </nav>
    </div>

    <div class="footer__divider"></div>

    <div class="footer__bottom">
      <p class="footer__copyright">{{ t('footer.copyright', { year: currentYear }) }}</p>
      <p class="footer__built-with">{{ t('footer.builtWith') }}</p>
    </div>
  </div>
</footer>
